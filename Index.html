<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cute Lamp Login Animation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-off: #0f1113;
            --bg-on: #16191d;
            --lamp-green: #4ade80;
            --lamp-gray: #2d2d2d;
            --transition-speed: 0.5s;
        }

        body {
            background-color: var(--bg-off);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            transition: background-color var(--transition-speed) ease;
            overflow: hidden;
        }

        body.is-lit {
            background-color: var(--bg-on);
        }

        /* Container Layout */
        .app-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 60px;
            width: 100%;
            max-width: 1000px;
            padding: 20px;
        }

        @media (min-width: 768px) {
            .app-container {
                flex-direction: row;
                justify-content: center;
                gap: 120px;
            }
        }

        /* Lamp UI */
        .lamp-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
        }

        .shade {
            width: 140px;
            height: 110px;
            background: var(--lamp-gray);
            clip-path: polygon(25% 0%, 75% 0%, 100% 100%, 0% 100%);
            z-index: 20;
            transition: all var(--transition-speed) ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        body.is-lit .shade {
            background: var(--lamp-green);
            box-shadow: 0 0 60px rgba(74, 222, 128, 0.3);
        }

        /* Face */
        .eyes {
            display: flex;
            gap: 24px;
        }

        .eye {
            width: 14px;
            height: 2px;
            background: #000;
            transition: all 0.3s ease;
        }

        body.is-lit .eye {
            height: 14px;
            border-radius: 50%;
        }

        .smile {
            width: 18px;
            height: 2px;
            background: #000;
            border-radius: 0 0 10px 10px;
            margin-top: 12px;
            opacity: 0;
            transition: all 0.3s ease;
        }

        body.is-lit .smile {
            opacity: 1;
            height: 10px;
        }

        /* Stand */
        .stand {
            width: 8px;
            height: 130px;
            background: #252525;
            margin-top: -2px;
        }

        .base {
            width: 90px;
            height: 12px;
            background: #252525;
            border-radius: 20px;
        }

        /* Pull String - Very important click area */
        .pull-string {
            position: absolute;
            left: 35px;
            top: 100px;
            width: 40px;
            height: 120px;
            cursor: pointer;
            z-index: 30;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .pull-string:active .string-line {
            height: 95px;
        }

        .string-line {
            width: 2px;
            height: 80px;
            background: #555;
            transition: height 0.1s ease;
        }

        .string-knob {
            width: 14px;
            height: 14px;
            background: #888;
            border-radius: 50%;
            margin-top: -2px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        /* Light Beam */
        .beam {
            position: absolute;
            top: 110px;
            width: 400px;
            height: 500px;
            background: radial-gradient(ellipse at top, rgba(74, 222, 128, 0.1) 0%, transparent 75%);
            clip-path: polygon(30% 0%, 70% 0%, 100% 100%, 0% 100%);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease;
        }

        body.is-lit .beam {
            opacity: 1;
        }

        /* Login Card */
        .login-card {
            background: #1a1d21;
            padding: 40px;
            border-radius: 24px;
            width: 360px;
            border: 1px solid #2a2a2a;
            opacity: 0;
            transform: scale(0.9) translateX(40px);
            transition: all 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }

        body.is-lit .login-card {
            opacity: 1;
            transform: scale(1) translateX(0);
            border-color: var(--lamp-green);
            pointer-events: auto;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }

        /* Inputs */
        .input-group label {
            display: block;
            color: #6b7280;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 0.05em;
        }

        .custom-input {
            width: 100%;
            background: #25282c;
            border: 1px solid #333;
            color: #fff;
            padding: 14px;
            border-radius: 12px;
            outline: none;
            margin-bottom: 24px;
            transition: border-color 0.3s;
        }

        .custom-input:focus {
            border-color: var(--lamp-green);
        }

        .login-btn {
            width: 100%;
            background: var(--lamp-green);
            color: #000;
            font-weight: 700;
            padding: 16px;
            border-radius: 12px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        /* Notification message */
        .msg-box {
            position: fixed;
            bottom: 40px;
            background: #22c55e;
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            transform: translateY(100px);
            transition: transform 0.4s ease;
            font-weight: 600;
        }

        .msg-box.visible {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div id="status-msg" class="msg-box">Logged in successfully!</div>

    <div class="app-container">
        <!-- Lamp Component -->
        <div class="lamp-wrapper">
            <div class="shade">
                <div class="eyes">
                    <div class="eye"></div>
                    <div class="eye"></div>
                </div>
                <div class="smile"></div>
            </div>
            <div class="stand"></div>
            <div class="base"></div>
            
            <!-- Pull String: Click anywhere in this area -->
            <div class="pull-string" id="string-pull">
                <div class="string-line"></div>
                <div class="string-knob"></div>
            </div>

            <!-- Light Beam -->
            <div class="beam"></div>
        </div>

        <!-- Login Card -->
        <div class="login-card">
            <h2 class="text-3xl font-bold text-white mb-2">Welcome Back</h2>
            <p class="text-gray-400 mb-8">Pull the string to reveal your workspace.</p>
            
            <div class="input-group">
                <label>Username</label>
                <input type="text" class="custom-input" placeholder="RahulTripathi">
            </div>
            
            <div class="input-group">
                <label>Password</label>
                <input type="password" class="custom-input" placeholder="••••••••">
            </div>
            
            <button class="login-btn" id="login-submit">Login Now</button>
            
            <div class="mt-6 flex justify-between text-xs text-gray-500">
                <a href="#" class="hover:text-green-400">Forgot Password?</a>
                <a href="#" class="hover:text-green-400">Join Community</a>
            </div>
        </div>
    </div>

    <script>
        const body = document.body;
        const stringTrigger = document.getElementById('string-pull');
        const loginBtn = document.getElementById('login-submit');
        const msgBox = document.getElementById('status-msg');

        // Toggle Function
        function toggleLight() {
            body.classList.toggle('is-lit');
        }

        // Pull String Logic
        stringTrigger.addEventListener('click', toggleLight);

        // Login Logic
        loginBtn.addEventListener('click', () => {
            msgBox.classList.add('visible');
            setTimeout(() => {
                msgBox.classList.remove('visible');
            }, 3000);
        });

        // Touch event for mobile users
        stringTrigger.addEventListener('touchstart', (e) => {
            e.preventDefault();
            toggleLight();
        });
    </script>
</body>
</html>
