<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lamp Login Animation</title>
    <!-- CSS file ko link kiya gaya hai -->
    <link rel="stylesheet" href="style.css">
    <!-- Tailwind for utility spacing (Optional but helpful) -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div class="flex flex-col md:flex-row items-center gap-24">
        <!-- Lamp UI Section -->
        <div class="lamp-container">
            <div class="shade">
                <div class="eyes">
                    <div class="eye"></div>
                    <div class="eye"></div>
                </div>
                <div class="mouth"></div>
            </div>
            <div class="stand"></div>
            <div class="base"></div>
            
            <!-- Pulling String -->
            <div class="pull-string" id="string-btn">
                <div class="string-line"></div>
                <div class="string-knob"></div>
            </div>

            <!-- Light Glow -->
            <div class="light-beam"></div>
        </div>

        <!-- Login Card Section -->
        <div class="login-card">
            <h1 class="text-3xl font-bold text-white mb-2">Welcome Back</h1>
            <p class="text-gray-400 mb-8">Turn on the lamp to login</p>

            <div class="input-group">
                <label>Username</label>
                <input type="text" class="input-field" placeholder="Enter username">
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" class="input-field" placeholder="••••••••">
            </div>

            <button class="login-btn">Login</button>
            
            <div class="mt-6 flex justify-between text-xs text-gray-500">
                <a href="#" class="hover:text-green-400 transition">Forgot Password?</a>
                <a href="#" class="hover:text-green-400 transition">Create Account</a>
            </div>
        </div>
    </div>

    <!-- JavaScript file ko link kiya gaya hai -->
    <script src="script.js"></script>
</body>
</html>
